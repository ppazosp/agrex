[project]
name = "agrex"
version = "0.7.0"
description = "Record agent execution traces for the agrex viewer"
readme = "README.md"
license = { file = "LICENSE" }
authors = [{ name = "ppazosp" }]
requires-python = ">=3.10"
keywords = ["agent", "tracing", "observability", "ai", "llm"]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Software Development :: Libraries",
]
dependencies = [
  "pydantic>=2.0,<3.0",
]

[project.urls]
Homepage = "https://github.com/ppazosp/agrex"
Repository = "https://github.com/ppazosp/agrex"
Issues = "https://github.com/ppazosp/agrex/issues"
"Trace format" = "https://github.com/ppazosp/agrex/blob/main/docs/trace-format.md"

[dependency-groups]
dev = [
  "pytest>=8.0",
  "pytest-asyncio>=0.23",
  "ruff>=0.6",
  "mypy>=1.10",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agrex"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.ruff]
line-length = 110
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM", "RUF"]

[tool.mypy]
strict = true
python_version = "3.10"
