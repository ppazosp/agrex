name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build

  publish:
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - id: check-version
        working-directory: packages/agrex
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@ppazosp/agrex@$VERSION" version >/dev/null 2>&1; then
            echo "already-published=true" >> "$GITHUB_OUTPUT"
            echo "@ppazosp/agrex@$VERSION is already on npm — skipping publish"
          else
            echo "already-published=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.check-version.outputs.already-published == 'false'
        run: pnpm --filter @ppazosp/agrex build
      - if: steps.check-version.outputs.already-published == 'false'
        run: npm install -g npm@latest
      - if: steps.check-version.outputs.already-published == 'false'
        run: npm publish --provenance --access public
        working-directory: packages/agrex
