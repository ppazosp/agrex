name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build

  publish:
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - id: check-version
        working-directory: packages/agrex
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@ppazosp/agrex@$VERSION" version >/dev/null 2>&1; then
            echo "already-published=true" >> "$GITHUB_OUTPUT"
            echo "@ppazosp/agrex@$VERSION is already on npm — skipping publish"
          else
            echo "already-published=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.check-version.outputs.already-published == 'false'
        run: pnpm --filter @ppazosp/agrex build
      - if: steps.check-version.outputs.already-published == 'false'
        run: npm install -g npm@latest
      - if: steps.check-version.outputs.already-published == 'false'
        run: npm publish --provenance --access public
        working-directory: packages/agrex

  python-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Sync dependencies
        working-directory: packages/agrex-py
        run: uv sync --frozen
      - name: Lint
        working-directory: packages/agrex-py
        run: uv run ruff check src tests
      - name: Format check
        working-directory: packages/agrex-py
        run: uv run ruff format --check src tests
      - name: Type check
        working-directory: packages/agrex-py
        run: uv run mypy src
      - name: Test
        working-directory: packages/agrex-py
        run: uv run pytest -v

  python-publish:
    needs: python-check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v3
      - id: check-version
        working-directory: packages/agrex-py
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if curl -sf "https://pypi.org/pypi/agrex/$VERSION/json" >/dev/null 2>&1; then
            echo "already-published=true" >> "$GITHUB_OUTPUT"
            echo "agrex==$VERSION already on PyPI — skipping publish"
          else
            echo "already-published=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.check-version.outputs.already-published == 'false'
        working-directory: packages/agrex-py
        run: uv build
      - if: steps.check-version.outputs.already-published == 'false'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/agrex-py/dist
